# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    polarix_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    hand_controller:
      type: position_controllers/GripperActionController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

polarix_arm_controller:
  ros__parameters:
    joints:
      - base_joint
      - shoulder_joint
      - elbow_joint
      - wrist_roll
      - wrist_pitch
    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity
hand_controller:
  ros__parameters:
    joint: finger_joint_left
    goal_tolerance: 0.002
    stall_velocity_threshold: 0.005
    stall_timeout: 0.5


